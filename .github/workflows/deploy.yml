name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-coolify
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, conand]
    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBSITE_UUID: ${{ secrets.COOLIFY_WEBSITE_UUID }}
        run: |
          set -euo pipefail
          response=$(curl -fsS \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_URL}/api/v1/deploy?uuid=${COOLIFY_WEBSITE_UUID}&force=false")
          echo "Coolify response: ${response}"
